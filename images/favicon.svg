<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .bg { fill: #1a1208; }
      .frame { fill: none; stroke: #b84a1a; stroke-width: 3; }
      .h { fill: #fffdf7; font-family: 'Playfair Display', Georgia, serif; }
      .mark { fill: #b84a1a; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="200" height="200" rx="4"/>
  <!-- Outer frame -->
  <rect class="frame" x="8" y="8" width="184" height="184" rx="2"/>
  <!-- Inner accent line top -->
  <rect class="mark" x="8" y="8" width="184" height="5"/>

  <!-- H letterform - two verticals + crossbar -->
  <!-- Left pillar -->
  <rect class="h" fill="#fffdf7" x="38" y="48" width="18" height="104"/>
  <!-- Right pillar -->
  <rect class="h" fill="#fffdf7" x="144" y="48" width="18" height="104"/>
  <!-- Crossbar -->
  <rect class="h" fill="#fffdf7" x="38" y="91" width="124" height="18"/>

  <!-- Accent dot - red square bottom right of H -->
  <rect class="mark" x="144" y="134" width="18" height="18"/>

  <!-- Tiny label -->
  <text x="100" y="175" text-anchor="middle" font-family="'Courier Prime', 'Courier New', monospace" font-size="9" letter-spacing="3" fill="#8a7a62">HUMANTYPE</text>
</svg>
